<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Cursor Gateway Desktop</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; }
    button { margin-right: 8px; margin-bottom: 8px; padding: 8px 12px; }
    pre { background: #111; color: #eee; padding: 10px; border-radius: 8px; white-space: pre-wrap; }
  @keyframes move{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  </style>
</head>
<body>
  <h2>Cursor Gateway Desktop</h2>
  <div id="loadingWrap" style="margin:10px 0 14px 0;">
    <div style="font-size:12px;opacity:.8;margin-bottom:6px">初始化中...</div>
    <div style="height:8px;background:#1f2937;border-radius:999px;overflow:hidden">
      <div id="loadingBar" style="height:100%;width:40%;background:linear-gradient(90deg,#22d3ee,#6366f1);border-radius:999px;animation:move 1.2s ease-in-out infinite"></div>
    </div>
  </div>
  <p id="base"></p>
  <p id="auth" style="font-size:13px;">登录状态检测中...</p>
  <div>
    <button onclick="start()">启动服务</button>
    <button onclick="stop()">停止服务</button>
    <button onclick="login()">Cursor 登录</button>
    <button onclick="status()">状态检测</button>
  </div>
  <div>
    <button onclick="check('/health')">检查 /health</button>
    <button onclick="check('/v1/models')">检查 /v1/models</button>
  </div>
  <pre id="out">准备就绪（首次使用建议先点“状态检测”）</pre>

  <script>
    document.getElementById('base').textContent = `Base URL: ${window.gateway.baseURL}/v1`;
    setTimeout(refreshStatus, 600); setInterval(refreshStatus, 5000);
    async function start(){ await window.gateway.start(); document.getElementById('out').textContent='已请求启动'; }
    async function stop(){ await window.gateway.stop(); document.getElementById('out').textContent='已请求停止'; }
    async function login(){ await window.gateway.login(); document.getElementById('out').textContent='已启动登录流程，请按弹窗结果操作'; }
    async function status(){
      const out = document.getElementById('out');
      out.textContent = '检测中...';
      const s = await window.gateway.status();
      const guide = s.token.ok ? '✅ Token 已就绪，可直接调用 API。' : '⚠️ 未登录，请先点“Cursor 登录”。';
      out.textContent = `${guide}\n\nToken: ${s.token.msg}\nHealth: [${s.health.status}] ${s.health.body}`;
    }
    async function refreshStatus(){
      const s = await window.gateway.status();
      const el = document.getElementById('auth');
      if (s?.token?.ok) {
        el.textContent = '✅ 已登录 Cursor';
        el.style.color = '#16a34a';
      } else {
        el.textContent = '⚠️ 未登录 Cursor（请点击“Cursor 登录”）';
        el.style.color = '#f59e0b';
      }
      if (s?.health?.ok || s?.health?.status===200) {
        const w = document.getElementById('loadingWrap');
        if (w) w.style.display='none';
      }
    }

    async function check(path){
      const out = document.getElementById('out');
      out.textContent = '请求中...';
      const r = await window.gateway.check(path);
      out.textContent = `[${r.status}] ${r.url}\n\n${r.body}`;
    }
  </script>
</body>
</html>
